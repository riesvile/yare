version: "3.3"
services:
  main:
    build:
      context: .
    environment:
      - NODE_ENV=dev
    depends_on:
      - mongodb
  game:
    build:
      context: .
      dockerfile: game/Dockerfile
    environment:
      - NODE_ENV=dev
    depends_on:
      - mongodb
  mongodb:
    image: "mongo"
  frontend:
    build:
      context: dev/haproxy
    ports:
      - "5000:5000"
    depends_on:
      - main
      - game