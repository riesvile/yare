version: "3.3"
services:
  main:
    build:
      context: .
    environment:
      - NODE_ENV=dev
    depends_on:
      - mongodb
      - minio
    volumes:
      - ./public:/usr/src/app/public
  d1:
    build:
      context: .
      dockerfile: game/Dockerfile
    environment:
      - NODE_ENV=dev
    depends_on:
      - mongodb
      - minio
    volumes:
      - ./public:/usr/src/app/public
  d2:
    build:
      context: .
      dockerfile: game/Dockerfile
    environment:
      - SERVER=d2
      - NODE_ENV=dev
    depends_on:
      - mongodb
      - minio
    volumes:
      - ./public:/usr/src/app/public
  tutorial:
    build:
      context: .
      dockerfile: game/Dockerfile
    environment:
      - NODE_ENV=dev
      - SERVER=t2
      - SERVER_TYPE=tutorial
    depends_on:
      - mongodb
  mongodb:
    image: "mongo"
  frontend:
    build:
      context: dev/haproxy
    ports:
      - "5000:5000"
    depends_on:
      - main
      - d1
      - d2
      - tutorial
      - minio
  minio:
    image: "minio/minio"
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address=:9001"]