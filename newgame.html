	  function getCookie(name) {
	      var nameEQ = name + "=";
	      var ca = document.cookie.split(';');
	      for(var i=0;i < ca.length;i++) {
	          var c = ca[i];
	          while (c.charAt(0)==' ') c = c.substring(1,c.length);
	          if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
	      }
	      return null;
	  }
	  
	  function eraseCookie(name) {   
	      document.cookie = name +'=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
	  }

	  function start_game(type){
		console.log('start game');
		wait_opponent_view();
		  
	  	fetch('/new-game', {
	          method: "POST",
	          headers: {
	            Accept: "application/json",
	            "Content-Type": "application/json"
	          },
	          body: JSON.stringify({
	  	        user_id: getCookie('user_id'),
				user_shape: chosen_shape,
			    user_color: chosen_color,
	  	        session_id: getCookie('session_id'),
	  			type: type
	  	    })
	  	}).then(response => response.json())
	        .then(response => {
	  		  //redirect to game id
	  		  console.log(response);
	  		  game_id = response.g_id;
	  		  if (response.meta == 'easy-bot'){
	  			 setCookie('game_id', game_id);
	  		  	 window.location.href = './t1/' + response.g_id;
	  			 //document.location.reload(true);
	  		  } else if (response.meta == 'waiting for p2'){
	  			  waiting_for_p2(response.g_id);
	  		  }
		  
		 
	  	  })
	        .catch(err => {
	  		  console.log(err);
	  	  });
	  	  console.log(getCookie('user_id'));
		  
	  }
