<!doctype html>
<html>
  <head>
    <title>yare.io – Leaderboard</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
	<link rel="manifest" href="/site.webmanifest">
	<meta content="text/html;charset=utf-8" http-equiv="Content-Type">
	<link rel="stylesheet" href="./style.css">
	<link rel="stylesheet" href="./documentation.css">
	<link rel="stylesheet" href="./style-mobile.css">
	<script src="./anime.min.js"></script>
	<style>
		.col-rank { width: 6%; }
		.col-player { width: 48%; }
		.col-games { width: 24%; }
		.col-elo { width: 22%; text-align: right; }
		.cell-rank { color: rgba(242, 246, 250, 0.36); }
		.cell-player { color: rgba(242, 246, 250, 0.86); font-weight: 500; }
		.cell-games { color: rgba(242, 246, 250, 0.44); }
		.cell-elo { color: rgba(242, 246, 250, 0.86); text-align: right; }
		#lbfill tr { cursor: pointer; }
		#lbfill tr:hover td { color: rgba(242, 246, 250, 1); }
	</style>
  </head>
  <body>

	<script src="/header.js"></script>

	<div id="doc_content">

		<div class="spacer-l"></div>

		<h1 class="doc_h1">Leaderboard</h1>

		<table>
			<thead>
				<tr>
					<th class="col-rank"></th>
					<th class="col-player">Player</th>
					<th class="col-games">Games</th>
					<th class="col-elo" style="text-align: right;">Elo</th>
				</tr>
			</thead>
			<tbody id="lbfill">
			</tbody>
		</table>

		<div class="spacer-xl"></div>

	</div>

  </body>

  <script>
	fetch('/populate-leaderboard', {
		method: "POST",
		headers: {
			Accept: "application/json",
			"Content-Type": "application/json"
		},
		body: JSON.stringify({ meta: 'top100' })
	}).then(function(r) { return r.json(); })
	  .then(function(response) {
		if (response.data === 'no results') return;
		var tbody = document.getElementById('lbfill');
		var html = '';
		for (var i = 0; i < response.stream.length; i++) {
			var u = response.stream[i];
			var games = u.games_count != null ? u.games_count : '';
			html += '<tr onclick="window.location=\'/' + u.user_id + '\'">'
				+ '<td class="cell-rank">' + (i + 1) + '</td>'
				+ '<td class="cell-player">' + u.user_id + '</td>'
				+ '<td class="cell-games">' + games + '</td>'
				+ '<td class="cell-elo">' + u.rating + '</td>'
				+ '</tr>';
		}
		tbody.innerHTML = html;
	}).catch(function(err) {
		console.error(err);
	});
  </script>

  <script src="./animations.js"></script>
  <script src="./basics.js"></script>
</html>
