<!doctype html>
<html>
  <head>
    <title>yare.io</title>
	<style>
	</style>
	<meta name="viewport" content="width=device-width, minimum-scale=1, maximum-scale=1, user-scalable=0">
	<link rel="stylesheet" href="/colors.css">
	<link rel="stylesheet" href="/style.css">
  </head>
  <body>
  
  	<div id="wait_container">
		<p id="load_para">Preparing the game...</p>
		<div id="tr_loader"></div>
	</div>
	  
  </body>

  <script>
	  
	  function getCookie(name) {
	      var nameEQ = name + "=";
	      var ca = document.cookie.split(';');
	      for(var i=0;i < ca.length;i++) {
	          var c = ca[i];
	          while (c.charAt(0)==' ') c = c.substring(1,c.length);
	          if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
	      }
	      return null;
	  }
	  
	  var pathParts = (window.location.pathname).split('/');
	  var g_id = pathParts[pathParts.length - 1];
	  var this_server = pathParts[pathParts.length - 2];
	  
	fetch('/' + this_server + 's/' + g_id, {
	        method: "POST",
	        headers: {
	          Accept: "application/json",
	          "Content-Type": "application/json"
	        },
	        body: JSON.stringify({
		        user_id: getCookie('user_id'),
		        session_id: getCookie('session_id'),
		    })

    }).then(response => response.json())
      .then(response => {
		  if (response.data == 'does not exist'){
		  	document.getElementById('load_para').innerHTML = 'Game does not exist';
		  } else if (response.data == 'game ready'){
			  setTimeout(function(){ window.location.href = '../' + response.server + '/' + g_id }, 200);
		  } else if (response.data == 'game already active'){
			  window.location.href = '../' + response.server + '/' + g_id;
		  }
	  })
	  .catch(error => {
		  console.error(error);
		  window.location.reload()
	  })
  </script>

  <script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt=""/></noscript>
</html>
