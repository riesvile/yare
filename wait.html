<!doctype html>
<html>
  <head>
    <title>yare.io</title>
	<style>
	</style>
	<meta name="viewport" content="width=device-width, minimum-scale=1, maximum-scale=1, user-scalable=0">
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./colors.css">
	<link rel="stylesheet" href="./style.css">
	<script src="./src-min-noconflict/ace.js" type="text/javascript" charset="utf-8"></script>
	<script src="./anime.min.js"></script>
  </head>
  <body>
  
  	<div id="wait_container">
		<p>Preparing your game...</p>
	</div>
	  
	  
	  
  </body>
  
  
  
  
  
  
  <script>
	  
	  function getCookie(name) {
	      var nameEQ = name + "=";
	      var ca = document.cookie.split(';');
	      for(var i=0;i < ca.length;i++) {
	          var c = ca[i];
	          while (c.charAt(0)==' ') c = c.substring(1,c.length);
	          if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
	      }
	      return null;
	  }
	  
	  
	  console.log('pathname');
	  console.log(window.location.pathname); 
	  var pathParts = (window.location.pathname).split('/');
	  var g_id = pathParts[pathParts.length - 1];
	  var this_server = pathParts[pathParts.length - 2];
	  console.log(this_server);
	  console.log(g_id);
	  
	fetch('/' + this_server + 's/' + g_id, {
	        method: "POST",
	        headers: {
	          Accept: "application/json",
	          "Content-Type": "application/json"
	        },
	        body: JSON.stringify({
		        user_id: getCookie('user_id'),
		        session_id: getCookie('session_id'),
		    })

    }).then(response => response.json())
      .then(response => {
		  console.log(response);
		  if (response.data == 'does not exist'){
		  	console.log('Game does not exist')
		  } else if (response.data == 'game ready'){
			  console.log('game is ready');
			  setTimeout(function(){ window.location.href = '../' + response.server + '/' + g_id }, 2000);
		  } else if (response.data == 'game already active'){
			  console.log('game is already active, redirect to it');
			  window.location.href = '../' + response.server + '/' + g_id;
		  } else {
		  	  console.log('something is wrong');
		  }
	  })
	  .catch(error => {
		  console.log(error);
	  })
	  
  
  </script>
</html>
